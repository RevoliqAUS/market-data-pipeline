services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports/output:/app/reports/output
      - ./config:/app/config
    command: uvicorn dashboard.api:app --host 0.0.0.0 --port 8000

